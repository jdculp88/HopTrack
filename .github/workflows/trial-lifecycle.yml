name: Trial Lifecycle

on:
  # Sprint 173 — schedule disabled until production is deployed. The
  # TRIAL_LIFECYCLE_ENDPOINT_URL secret currently points at a domain that
  # returns HTTP 404 (GoDaddy parked page). Re-enable by uncommenting and
  # updating the secret once prod is live.
  # schedule:
  #   # Daily 10am ET = 15:00 UTC (EST+5) / 14:00 UTC (EDT+4)
  #   # Using 15:00 UTC covers EST; during EDT it arrives at 11am — close enough
  #   - cron: "0 15 * * *"
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  run-trial-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Run trial lifecycle checks
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.TRIAL_LIFECYCLE_ENDPOINT_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP $http_code"
          echo "$body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Trial lifecycle request failed with HTTP $http_code"
            exit 1
          fi
