name: CI
# Sprint 151 — The Ops Room
# Sprint 173 — E2E FROZEN. The e2e job was removed in S173 and the test
# infrastructure moved to /e2e.frozen. `hoptrack-staging` is empty and the
# half-day seed sprint is deferred. See e2e.frozen/README.md to thaw.
#
# Current pipeline: lint → lint --quiet → type check → unit tests → build
# All run in a single `build` job. No E2E until `hoptrack-staging` is seeded.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Sprint 173 — second lint pass with --quiet surfaces errors only.
      # The full lint step above emits ~2600 warnings which bury actual
      # errors in noise; this step makes regressions loud in CI annotations.
      - name: Lint (errors only — regression guard)
        run: npm run lint -- --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        id: unit-tests
        run: npm run test:coverage

      - name: Unit test failure gate
        if: steps.unit-tests.outcome == 'failure'
        run: |
          echo "::error::Unit tests failed — build blocked. Fix failing tests before merging."
          exit 1

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build succeeds without real Supabase credentials.
          # The app checks for live connections at runtime, not build time.
          # Sprint 173: SUPABASE_SERVICE_ROLE_KEY added because /superadmin/barback
          # statically prerenders a service-role client and throws without it.
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
