name: CI
# Sprint 151 — The Ops Room
#
# Pipeline: lint → type check → unit tests (HARD-FAIL) → build → E2E
#
# E2E secrets (set in GitHub repo > Settings > Secrets and variables > Actions):
#   E2E_SUPABASE_URL          — Supabase project URL for E2E test instance
#   E2E_SUPABASE_ANON_KEY     — Supabase anon key for E2E test instance
#   E2E_SUPABASE_SERVICE_ROLE_KEY — Supabase service role key for E2E test instance
#
# If E2E secrets are not configured, the E2E job skips gracefully via health gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Sprint 173 — second lint pass with --quiet surfaces errors only.
      # The full lint step above emits ~2600 warnings which bury actual
      # errors in noise; this step makes regressions loud in CI annotations.
      - name: Lint (errors only — regression guard)
        run: npm run lint -- --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        id: unit-tests
        run: npm run test:coverage

      - name: Unit test failure gate
        if: steps.unit-tests.outcome == 'failure'
        run: |
          echo "::error::Unit tests failed — build blocked. Fix failing tests before merging."
          exit 1

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build succeeds without real Supabase credentials.
          # The app checks for live connections at runtime, not build time.
          # Sprint 173: SUPABASE_SERVICE_ROLE_KEY added because /superadmin/barback
          # statically prerenders a service-role client and throws without it.
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"

  e2e:
    needs: build
    runs-on: ubuntu-latest
    # Sprint 173 — E2E job is SKIPPED until hoptrack-staging is seeded.
    # The staging Supabase instance is empty (0 tables, 0 migrations). The
    # previous soft-fail approach (continue-on-error + --global-timeout) was
    # flaky: Playwright's 15-min global timeout races GitHub's job-level
    # timeout-minutes cap, producing "cancelled" workflow conclusions on
    # ~1 in 3 runs even though the build job was fully green.
    #
    # Cleanest solution: skip the job entirely. Re-enable by removing the
    # `if: false` below AFTER staging has:
    #   1. All 103 migrations applied (supabase db push)
    #   2. Test user testflight@hoptrack.beer created in Auth
    #   3. Seeds 024, 025, 008 run against it
    # Full re-enable instructions: memory/feedback_staging_supabase_empty.md
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Health check gate
        id: health-gate
        run: |
          # Build first with real credentials so the dev server can connect
          npm run build
          # Start server in background and wait for it
          npm run start &
          SERVER_PID=$!
          sleep 5

          # Check if server responds
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Health check passed (HTTP $HTTP_CODE)"
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Health check returned HTTP $HTTP_CODE — Supabase may be unreachable. Skipping E2E."
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

          # Stop the server
          kill $SERVER_PID 2>/dev/null || true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run E2E tests
        if: steps.health-gate.outputs.healthy == 'true'
        # Sprint 173 — --global-timeout=900000 (15 min in ms) makes Playwright
        # fail gracefully if the suite stalls (e.g., when staging Supabase has
        # no seed data). continue-on-error: true on this step (and the job)
        # ensures graceful failure doesn't break the workflow.
        continue-on-error: true
        run: npm run test:e2e -- --global-timeout=900000
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Skip notice
        if: steps.health-gate.outputs.healthy != 'true'
        run: echo "::warning::E2E tests skipped — Supabase health check failed. Configure E2E_SUPABASE_URL, E2E_SUPABASE_ANON_KEY, and E2E_SUPABASE_SERVICE_ROLE_KEY secrets."

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
