name: Barback Crawl

on:
  # Sprint 173 — schedule disabled until production env is configured. The
  # barback script requires NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
  # and ANTHROPIC_API_KEY secrets — none of which are currently set in the
  # repo (only E2E_SUPABASE_* variants exist). Re-enable by uncommenting and
  # adding the 3 missing secrets.
  # schedule:
  #   # Every Monday at 2am ET (7:00 UTC) — overnight, polite timing
  #   - cron: "0 7 * * 1"
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Barback crawl
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/barback-crawl.mjs
